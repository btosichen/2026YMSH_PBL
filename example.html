<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國中量化專題參考範例</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        /* 隱藏捲軸但可滾動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-400 via-cyan-300 to-emerald-300 p-4 md:p-8 flex items-center justify-center overflow-hidden">

    <!-- 主卡片容器 -->
    <div class="relative w-full max-w-5xl h-[90vh] md:h-[80vh] bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col">
        
        <!-- 幻燈片顯示區 -->
        <div id="slides-wrapper" class="relative flex-grow overflow-hidden">
            <!-- JavaScript 將會注入幻燈片內容 -->
        </div>

        <!-- 底部控制列 -->
        <div class="h-16 bg-white border-t border-gray-100 flex items-center justify-between px-4 md:px-8 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button id="btn-prev" onclick="prevSlide()" class="px-3 py-2 md:px-4 md:py-2 rounded-lg font-bold transition-colors text-sky-600 hover:bg-sky-50 flex items-center gap-1">
                <span>◀</span> <span class="hidden md:inline">上一頁</span>
            </button>
            
            <div id="page-indicator" class="flex gap-1.5 md:gap-2 items-center">
                <!-- 頁碼點點將由 JS 產生 -->
            </div>
            
            <button id="btn-next" onclick="nextSlide()" class="px-3 py-2 md:px-4 md:py-2 rounded-lg font-bold transition-colors text-sky-600 hover:bg-sky-50 flex items-center gap-1">
                <span class="hidden md:inline">下一頁</span> <span>▶</span>
            </button>
        </div>
    </div>

    <script>
        // --- 題目資料庫 ---
        const slidesData = [
            {
                id: 0,
                isCover: true,
                title: "📊 量化專題選題庫",
                subtitle: "選一個你最有感的題目，開始你的專題研究！",
                desc: "點擊下方卡片即可查看該題目的詳細研究方法與互動預測"
            },
            {
                id: 1, emoji: "📱", title: "手機 vs 成績",
                question: "每天滑手機時間是否會影響段考成績？",
                data: ["每日手機使用時間（小時）", "段考平均成績（分數）"],
                charts: ["📈 折線圖", "📉 散佈圖"],
                tip: "建議可以將同學分成「高使用組」與「低使用組」來做比較分析！",
                interaction: {
                    type: "slider", min: 0, max: 10, step: 1, default: 3, unit: "小時", label: "你一天滑幾小時手機？",
                    calc: (val) => {
                        let base = 90 - (val * 4.5);
                        let minScore = Math.max(0, Math.floor(base - 8));
                        let maxScore = Math.min(100, Math.floor(base + 8));
                        return `<div class="text-sm text-gray-500 mb-1">可能落點區間</div><div class="text-3xl font-black text-blue-600">${minScore} ~ ${maxScore} 分</div>`;
                    }
                }
            },
            {
                id: 2, emoji: "😴", title: "睡眠 vs 專心",
                question: "睡越多真的比較專心嗎？",
                data: ["每日平均睡眠時間（小時）", "上課自評專心程度（1~5分）"],
                charts: ["📊 長條圖", "📈 折線圖"],
                tip: "可以將睡眠時間分群：<6小時、6~8小時、>8小時",
                interaction: {
                    type: "buttons", label: "你昨天睡了幾小時？",
                    options: [
                        { label: "少於 6 小時 🥱", result: '專心預測：⭐ (1/5)<br><span class="text-sm">腦袋當機中，隨時會斷線...</span>' },
                        { label: "6 ~ 8 小時 🙂", result: '專心預測：⭐⭐⭐⭐ (4/5)<br><span class="text-sm">精神不錯，吸收力佳！</span>' },
                        { label: "超過 8 小時 🤩", result: '專心預測：⭐⭐⭐⭐⭐ (5/5)<br><span class="text-sm">火力全開！專注力 MAX！</span>' }
                    ]
                }
            },
            {
                id: 3, emoji: "🎮", title: "遊戲 vs 壓力",
                question: "玩遊戲到底是紓壓，還是會增加壓力？",
                data: ["每天遊戲時間（小時）", "壓力指數（1~5分）"],
                charts: ["📈 折線圖", "📉 散佈圖"],
                tip: "試著從數據中找出玩遊戲的「最佳紓壓時間點」！",
                interaction: {
                    type: "slider", min: 0, max: 6, step: 1, default: 1, unit: "小時", label: "每天玩幾小時遊戲？",
                    calc: (val) => {
                        const stressLevels = [3, 1, 2, 4, 5, 5, 5]; // U型曲線
                        const emojis = ["😐", "😌", "🙂", "😰", "🤯", "💀", "💀"];
                        return `<div class="text-sm text-gray-500 mb-1">壓力指數預測</div><div class="text-4xl">${emojis[val]} <span class="font-bold">${stressLevels[val]}/5</span></div>`;
                    }
                }
            },
            {
                id: 4, emoji: "📚", title: "讀書 vs 成績",
                question: "讀越久，成績就一定考得越好嗎？",
                data: ["每日課後讀書時間（小時）", "成績表現"],
                charts: ["📈 折線圖", "📊 長條圖"],
                tip: "除了時間，也可以加入「專注度」或「讀書效率」作為變數喔！",
                interaction: {
                    type: "slider", min: 0, max: 8, step: 1, default: 2, unit: "小時", label: "每天課後讀書多久？",
                    calc: (val) => {
                        const grades = [50, 65, 78, 85, 90, 93, 95, 94, 92]; // 邊際效益遞減
                        let color = val >= 4 ? "text-green-500" : (val >= 2 ? "text-yellow-500" : "text-red-500");
                        return `<div class="text-sm text-gray-500 mb-1">預期成績趨勢</div><div class="text-5xl font-black ${color}">${grades[val]}</div>`;
                    }
                }
            },
            {
                id: 5, emoji: "🏃", title: "運動 vs 心情",
                question: "有規律運動習慣的人，心情會比較好嗎？",
                data: ["每週運動次數", "平時心情評分（1~5分）"],
                charts: ["📊 長條圖", "🕸️ 雷達圖"],
                tip: "問卷中可以進一步調查同學們常做的「運動種類」！",
                interaction: {
                    type: "buttons", label: "你每週大約運動幾次？",
                    options: [
                        { label: "完全不運動 🛋️", result: '心情指數：⭐⭐ (2/5)<br><span class="text-sm">有點悶，該去曬曬太陽了！</span>' },
                        { label: "1~2 次 🚶", result: '心情指數：⭐⭐⭐ (3/5)<br><span class="text-sm">還算平靜，保持下去</span>' },
                        { label: "3~4 次 🏃", result: '心情指數：⭐⭐⭐⭐⭐ (5/5)<br><span class="text-sm">多巴胺分泌中！充滿快樂活力！</span>' },
                        { label: "每天狂練 🏋️", result: '心情指數：⭐⭐⭐⭐ (4/5)<br><span class="text-sm">有點累但很充實！</span>' }
                    ]
                }
            },
            {
                id: 6, emoji: "🍔", title: "早餐 vs 精神",
                question: "早上有吃早餐，第一節課會比較有精神嗎？",
                data: ["是否吃早餐（是/否）", "早自習/第一節課精神程度（1~5分）"],
                charts: ["📊 圓餅圖", "📊 長條圖"],
                tip: "這是一個標準的「二分類」比較題，最適合用來做兩組數據的平均差異！",
                interaction: {
                    type: "buttons", label: "你今天早上有吃早餐嗎？",
                    options: [
                        { label: "有吃早餐 🥐", result: '早晨精神：⭐⭐⭐⭐⭐ (5/5)<br><span class="text-lg font-bold text-green-600">電量 100% 🔋</span>' },
                        { label: "沒吃早餐 ❌", result: '早晨精神：⭐⭐ (2/5)<br><span class="text-lg font-bold text-red-500">電量 20% 🪫 (低電量警報)</span>' }
                    ]
                }
            },
            {
                id: 7, emoji: "🎧", title: "音樂 vs 學習",
                question: "邊聽音樂邊讀書，到底有沒有效？",
                data: ["讀書時是否聽音樂/類型", "學習效率主觀評分（1~5分）"],
                charts: ["📊 長條圖"],
                tip: "一定要將音樂細分（如：人聲流行樂、純音樂、白噪音），結果會差很多！",
                interaction: {
                    type: "buttons", label: "你讀書時都聽什麼？",
                    options: [
                        { label: "不聽音樂 🤫", result: '專注度：⭐⭐⭐⭐ (4/5)<br><span class="text-sm">穩扎穩打的學習法</span>' },
                        { label: "輕音樂/Lo-Fi ☕", result: '專注度：⭐⭐⭐⭐⭐ (5/5)<br><span class="text-sm">白噪音幫你進入心流狀態！</span>' },
                        { label: "流行樂/Kpop 🎤", result: '專注度：⭐⭐ (2/5)<br><span class="text-sm">糟糕，忍不住跟著唱起來了...</span>' }
                    ]
                }
            },
            {
                id: 8, emoji: "💤", title: "晚睡 vs 表現",
                question: "熬夜讀書對隔天的學習表現有什麼影響？",
                data: ["就寢時間點", "隔天上課表現（1~5分）"],
                charts: ["📈 折線圖"],
                tip: "試著找出影響表現下滑的「臨界點時間」（例如：超過12點後急遽下滑）。",
                interaction: {
                    type: "slider", min: 9, max: 15, step: 1, default: 11, unit: "點睡", label: "昨晚大約幾點睡？",
                    calc: (val) => {
                        const timeStr = val > 12 ? `凌晨 ${val-12} 點` : `晚上 ${val} 點`;
                        const scores = {9:5, 10:5, 11:4, 12:3, 13:2, 14:1, 15:1}; // index maps to score
                        const bgColors = {5:'text-green-500', 4:'text-blue-500', 3:'text-yellow-500', 2:'text-orange-500', 1:'text-red-500'};
                        let perf = scores[val];
                        let emoji = perf >= 4 ? '🔋' : (perf == 3 ? '🪫' : '💀');
                        return `<div class="text-sm text-gray-500 mb-1">${timeStr} 睡覺的隔天表現</div><div class="text-4xl font-black ${bgColors[perf]}">${emoji} ${perf}/5</div>`;
                    }
                }
            },
            {
                id: 9, emoji: "💬", title: "社群 vs 人際",
                question: "花越多時間在社群軟體上，人際關係越好嗎？",
                data: ["社群軟體每日使用時間", "同儕人際滿意度（1~5分）"],
                charts: ["📉 散佈圖"],
                tip: "注意觀察「反效果」，過度使用是否反而導致孤獨感上升？",
                interaction: {
                    type: "slider", min: 0, max: 8, step: 1, default: 2, unit: "小時", label: "每天滑 IG/Threads 多久？",
                    calc: (val) => {
                        // Peak around 1-2 hours, drops afterwards
                        const scores = [3, 4, 4.5, 4, 3, 2.5, 2, 1.5, 1];
                        let color = val <= 3 ? "text-pink-500" : "text-gray-400";
                        return `<div class="text-sm text-gray-500 mb-1">人際滿意度預測</div><div class="text-4xl font-black ${color}">${scores[val]} / 5</div><div class="text-xs text-gray-400 mt-2">※ 適度社交最佳，過度容易FOMO</div>`;
                    }
                }
            },
            {
                id: 10, emoji: "🧠", title: "AI vs 學習",
                question: "使用 AI 工具協助課業，真的能提升理解力嗎？",
                data: ["AI工具使用頻率/方式", "對課業的理解程度（1~5分）"],
                charts: ["📊 長條圖", "🕸️ 雷達圖"],
                tip: "可以將調查重點放在「如何使用」，比較當輔助家教 vs 直接抄答案的差異！",
                interaction: {
                    type: "buttons", label: "你平常怎麼用 AI 寫作業？",
                    options: [
                        { label: "完全不用 🙅", result: '概念理解力：⭐⭐⭐ (3/5)<br><span class="text-sm">靠自己苦讀，基礎很扎實</span>' },
                        { label: "當輔助家教問問題 💡", result: '概念理解力：⭐⭐⭐⭐⭐ (5/5)<br><span class="text-sm font-bold text-sky-600">觀念超清晰！學習效率 Max！</span>' },
                        { label: "直接複製貼上抄答案 🤖", result: '概念理解力：⭐ (1/5)<br><span class="text-sm text-red-500">大考原形畢露，完全沒吸收...</span>' }
                    ]
                }
            }
        ];

        let currentSlide = 0;

        // 初始化
        function init() {
            renderSlides();
            updateNav();
            
            // 觸發初始的 slider 計算
            slidesData.forEach(s => {
                if (s.interaction && s.interaction.type === 'slider') {
                    updateSlider(s.id, s.interaction.default);
                }
            });
        }

        // 產生 DOM
        function renderSlides() {
            const wrapper = document.getElementById('slides-wrapper');
            let html = '';

            slidesData.forEach((s, index) => {
                let innerHTML = '';

                if (s.isCover) {
                    // 封面頁
                    let gridHtml = slidesData.slice(1).map(slide => `
                        <button onclick="goToSlide(${slide.id})" class="p-3 md:p-4 bg-white/80 backdrop-blur-sm border-2 border-transparent hover:border-sky-400 shadow-sm hover:shadow-lg rounded-2xl text-left transition-all transform hover:-translate-y-1 group">
                            <div class="text-2xl md:text-3xl mb-1 group-hover:scale-110 transition-transform">${slide.emoji}</div>
                            <div class="font-bold text-gray-800 text-sm md:text-base">${slide.title}</div>
                        </button>
                    `).join('');

                    innerHTML = `
                        <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-sky-50/90 no-scrollbar overflow-y-auto">
                            <div class="inline-block px-4 py-1.5 bg-yellow-300 text-yellow-800 rounded-full text-sm font-bold mb-4 md:mb-6 shadow-sm">🚀 國中生專屬</div>
                            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-sky-500 via-cyan-500 to-emerald-500 mb-3 md:mb-4 tracking-tight drop-shadow-sm">${s.title}</h1>
                            <p class="text-base md:text-lg text-gray-600 mb-8 max-w-xl">${s.subtitle}</p>
                            <div class="grid grid-cols-2 md:grid-cols-5 gap-3 md:gap-4 w-full max-w-4xl pb-8">
                                ${gridHtml}
                            </div>
                        </div>
                    `;
                } else {
                    // 內容頁互動區
                    let interactionHtml = '';
                    if (s.interaction.type === 'slider') {
                        interactionHtml = `
                            <p class="font-bold text-gray-700 mb-6">${s.interaction.label}</p>
                            <div class="w-full flex items-center gap-4 mb-2">
                                <span class="text-sm font-bold text-gray-400">${s.interaction.min}</span>
                                <input type="range" min="${s.interaction.min}" max="${s.interaction.max}" step="${s.interaction.step}" value="${s.interaction.default}" 
                                    class="w-full h-3 bg-sky-100 rounded-lg appearance-none cursor-pointer accent-sky-500 hover:accent-sky-400 transition-all"
                                    oninput="updateSlider(${s.id}, this.value)">
                                <span class="text-sm font-bold text-gray-400">${s.interaction.max}</span>
                            </div>
                            <div class="text-2xl font-black text-sky-600 mb-6 drop-shadow-sm">
                                <span id="slider-val-${s.id}">${s.interaction.default}</span> 
                                <span class="text-lg text-sky-400">${s.interaction.unit}</span>
                            </div>
                            <div id="result-${s.id}" class="mt-2 p-5 bg-white/90 backdrop-blur rounded-2xl shadow-sm border-2 border-sky-50 w-full min-h-[120px] flex flex-col items-center justify-center text-center transition-all duration-300 transform scale-100">
                                <!-- JS動態結果 -->
                            </div>
                        `;
                    } else if (s.interaction.type === 'buttons') {
                        let btns = s.interaction.options.map((opt, i) => `
                            <button onclick="updateButton(${s.id}, ${i}, this)" class="btn-opt-${s.id} w-full py-2.5 px-4 bg-white hover:bg-sky-50 hover:text-sky-600 border-2 border-sky-100 hover:border-sky-300 rounded-xl shadow-sm transition-all text-gray-700 font-bold text-sm md:text-base mb-2.5 active:scale-95">
                                ${opt.label}
                            </button>
                        `).join('');
                        interactionHtml = `
                            <p class="font-bold text-gray-700 mb-4">${s.interaction.label}</p>
                            <div class="w-full mb-2">
                                ${btns}
                            </div>
                            <div id="result-${s.id}" class="mt-auto p-5 bg-white/90 backdrop-blur rounded-2xl shadow-sm border-2 border-sky-50 w-full min-h-[120px] flex flex-col items-center justify-center text-center text-gray-600 transition-all duration-300">
                                <span class="animate-pulse text-sky-400 text-sm">👇 點擊上方選項測試 👇</span>
                            </div>
                        `;
                    }

                    // 內容頁排版
                    innerHTML = `
                        <div class="absolute inset-0 flex flex-col bg-white">
                            <!-- Header -->
                            <div class="px-6 py-4 md:px-8 md:py-5 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r from-gray-50 to-white shrink-0">
                                <h2 class="text-2xl md:text-3xl font-extrabold flex items-center gap-3 text-gray-800 tracking-tight">
                                    <span class="text-3xl md:text-4xl drop-shadow-sm">${s.emoji}</span> ${s.title}
                                </h2>
                                <span class="hidden md:inline-block text-xs font-bold text-sky-500 bg-sky-50 border border-sky-100 px-3 py-1.5 rounded-full uppercase tracking-wider">Topic ${String(s.id).padStart(2, '0')}</span>
                            </div>

                            <!-- Body -->
                            <div class="flex-grow grid grid-cols-1 md:grid-cols-12 gap-0 overflow-y-auto no-scrollbar">
                                
                                <!-- 左側：專題資訊 -->
                                <div class="md:col-span-7 p-6 md:p-8 space-y-5 md:space-y-7 bg-white">
                                    <div class="bg-sky-50/80 p-5 rounded-2xl border-l-4 border-sky-400 relative overflow-hidden group">
                                        <div class="absolute -right-4 -top-4 text-6xl opacity-10 group-hover:scale-110 transition-transform">❓</div>
                                        <h3 class="font-bold text-sky-800 mb-2 flex items-center gap-2 text-lg">研究問題</h3>
                                        <p class="text-gray-700 text-lg md:text-xl font-medium tracking-wide">${s.question}</p>
                                    </div>

                                    <div>
                                        <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                                            <span class="bg-blue-100 text-blue-600 p-1.5 rounded-lg text-sm">📊</span> 收集資料
                                        </h3>
                                        <ul class="space-y-2 ml-2">
                                            ${s.data.map(d => `<li class="flex items-start text-gray-600"><span class="text-blue-400 mr-2 mt-0.5">•</span> <span>${d}</span></li>`).join('')}
                                        </ul>
                                    </div>

                                    <div>
                                        <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                                            <span class="bg-green-100 text-green-600 p-1.5 rounded-lg text-sm">📈</span> 建議圖表
                                        </h3>
                                        <div class="flex flex-wrap gap-2">
                                            ${s.charts.map(c => `<span class="px-3 py-1.5 bg-gray-50 text-gray-700 rounded-lg text-sm font-bold border border-gray-200 shadow-sm">${c}</span>`).join('')}
                                        </div>
                                    </div>

                                    <div class="bg-amber-50 p-4 md:p-5 rounded-2xl border border-amber-100 flex items-start gap-3">
                                        <div class="text-2xl animate-bounce">💡</div>
                                        <div>
                                            <h3 class="font-bold text-amber-900 mb-1">給你的小提示</h3>
                                            <p class="text-amber-700 text-sm leading-relaxed">${s.tip}</p>
                                        </div>
                                    </div>
                                </div>

                                <!-- 右側：互動區 -->
                                <div class="md:col-span-5 bg-gradient-to-b from-gray-50 to-sky-50/50 p-6 md:p-8 flex flex-col items-center justify-center border-t md:border-t-0 md:border-l border-gray-100">
                                    <div class="inline-block px-4 py-1.5 bg-gradient-to-r from-sky-400 to-cyan-400 text-white rounded-full text-sm font-bold mb-6 shadow-md flex items-center gap-2">
                                        🎮 即時互動預測
                                    </div>
                                    <div class="w-full max-w-sm flex flex-col items-center">
                                        ${interactionHtml}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // 添加轉場狀態 class
                let visibilityClass = index === 0 ? 'translate-x-0 opacity-100 z-10' : 'translate-x-full opacity-0 z-0 pointer-events-none';
                
                html += `
                    <div id="slide-${index}" class="absolute inset-0 w-full h-full transition-all duration-500 ease-in-out transform ${visibilityClass}">
                        ${innerHTML}
                    </div>
                `;
            });
            wrapper.innerHTML = html;
        }

        // --- 互動邏輯 ---

        // Slider 更新
        window.updateSlider = (id, val) => {
            document.getElementById(`slider-val-${id}`).innerText = val;
            const slide = slidesData.find(s => s.id === id);
            if (slide && slide.interaction.calc) {
                const resultBox = document.getElementById(`result-${id}`);
                resultBox.innerHTML = slide.interaction.calc(Number(val));
                // Add pop animation
                resultBox.classList.remove('scale-100');
                resultBox.classList.add('scale-105');
                setTimeout(() => {
                    resultBox.classList.remove('scale-105');
                    resultBox.classList.add('scale-100');
                }, 200);
            }
        };

        // 按鈕更新
        window.updateButton = (id, optIndex, btnElement) => {
            const slide = slidesData.find(s => s.id === id);
            if (slide && slide.interaction.options) {
                const resultBox = document.getElementById(`result-${id}`);
                resultBox.innerHTML = slide.interaction.options[optIndex].result;
                
                // 重置所有按鈕樣式
                const buttons = document.querySelectorAll(`.btn-opt-${id}`);
                buttons.forEach(b => {
                    b.classList.remove('bg-sky-500', 'text-white', 'border-sky-500');
                    b.classList.add('bg-white', 'text-gray-700');
                });
                
                // 設定點擊按鈕樣式
                btnElement.classList.remove('bg-white', 'text-gray-700', 'hover:bg-sky-50');
                btnElement.classList.add('bg-sky-500', 'text-white', 'border-sky-500');
            }
        };

        // --- 導覽邏輯 ---

        window.goToSlide = (index) => {
            if (index === currentSlide) return;
            const prev = currentSlide;
            currentSlide = index;

            const currentEl = document.getElementById(`slide-${currentSlide}`);
            const prevEl = document.getElementById(`slide-${prev}`);

            // 決定滑動方向
            if (currentSlide > prev) {
                prevEl.className = "absolute inset-0 w-full h-full transition-all duration-500 ease-in-out transform -translate-x-full opacity-0 z-0 pointer-events-none";
            } else {
                prevEl.className = "absolute inset-0 w-full h-full transition-all duration-500 ease-in-out transform translate-x-full opacity-0 z-0 pointer-events-none";
            }
            
            currentEl.className = "absolute inset-0 w-full h-full transition-all duration-500 ease-in-out transform translate-x-0 opacity-100 z-10";
            
            updateNav();
        };

        window.nextSlide = () => {
            if (currentSlide < slidesData.length - 1) goToSlide(currentSlide + 1);
        };

        window.prevSlide = () => {
            if (currentSlide > 0) goToSlide(currentSlide - 1);
        };

        function updateNav() {
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const dots = document.getElementById('page-indicator');

            // 按鈕狀態
            btnPrev.disabled = currentSlide === 0;
            btnNext.disabled = currentSlide === slidesData.length - 1;
            btnPrev.style.opacity = currentSlide === 0 ? '0.3' : '1';
            btnNext.style.opacity = currentSlide === slidesData.length - 1 ? '0.3' : '1';

            // 圓點產生與狀態
            dots.innerHTML = slidesData.map((_, i) => `
                <button onclick="goToSlide(${i})" class="h-2 md:h-2.5 rounded-full transition-all duration-300 ${i === currentSlide ? 'bg-sky-500 w-6 md:w-8' : 'bg-gray-300 w-2 md:w-2.5 hover:bg-gray-400'}"></button>
            `).join('');
        }

        // 啟動 App
        init();

    </script>
</body>
</html>
