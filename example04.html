<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>讀書時間 vs 成績專題</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: linear-gradient(135deg,#8ec5fc,#e0c3fc);
  font-family: 'Noto Sans TC', sans-serif;
}
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
}
</style>
</head>

<body class="p-6">

<div class="max-w-4xl mx-auto">

<!-- 標題 -->
<div class="card p-6 rounded-2xl mb-6 text-center">
  <h1 class="text-3xl font-black text-blue-600">📚 讀書時間 vs 成績</h1>
  <p class="text-gray-600">用數據找出答案 🔍</p>
</div>

<!-- Step流程 -->
<div class="card p-6 rounded-2xl mb-6">
  <h2 class="font-bold text-xl mb-3">🚀 專題流程</h2>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
    <div class="bg-blue-100 p-3 rounded-xl">1️⃣ 收集資料</div>
    <div class="bg-purple-100 p-3 rounded-xl">2️⃣ 整理資料</div>
    <div class="bg-green-100 p-3 rounded-xl">3️⃣ 分析資料</div>
    <div class="bg-pink-100 p-3 rounded-xl">4️⃣ 寫結論</div>
  </div>
</div>

<!-- 輸入資料 -->
<div class="card p-6 rounded-2xl mb-6">
  <h2 class="font-bold text-xl mb-4">📝 輸入你的資料</h2>

  <div class="grid md:grid-cols-3 gap-4">
    <input id="study" type="number" placeholder="讀書時間 (小時)" class="p-3 rounded-xl border">
    <input id="score" type="number" placeholder="成績 (0~100)" class="p-3 rounded-xl border">
    <button onclick="addData()" class="bg-blue-500 text-white rounded-xl font-bold">➕ 加入</button>
  </div>
</div>

<!-- 資料表 -->
<div class="card p-6 rounded-2xl mb-6">
  <h2 class="font-bold text-xl mb-3">📊 目前資料</h2>
  <div id="dataList"></div>
</div>

<!-- 分析按鈕 -->
<div class="text-center mb-6">
  <button onclick="analyze()" class="bg-green-500 text-white px-6 py-3 rounded-xl font-bold">
    🔍 開始分析
  </button>
</div>

<!-- 圖表 -->
<div class="card p-6 rounded-2xl mb-6">
  <canvas id="chart"></canvas>
</div>

<!-- 結論 -->
<div class="card p-6 rounded-2xl">
  <h2 class="font-bold text-xl mb-3">🧠 AI結論</h2>
  <div id="result" class="text-gray-700"></div>
</div>

</div>

<script>

let data = [];

function addData(){
  let s = parseFloat(document.getElementById("study").value);
  let sc = parseFloat(document.getElementById("score").value);

  if(isNaN(s)||isNaN(sc)) return alert("請輸入數值");

  data.push({study:s,score:sc});
  render();
}

function render(){
  let html="";
  data.forEach(d=>{
    html+=`<div>${d.study} 小時 → ${d.score} 分</div>`;
  });
  document.getElementById("dataList").innerHTML=html;
}

function analyze(){

  let groups = {
    "0-1":[],
    "1-2":[],
    "2-3":[],
    "3+":[],
  };

  data.forEach(d=>{
    if(d.study<1) groups["0-1"].push(d.score);
    else if(d.study<2) groups["1-2"].push(d.score);
    else if(d.study<3) groups["2-3"].push(d.score);
    else groups["3+"].push(d.score);
  });

  let labels=[];
  let values=[];

  for(let key in groups){
    if(groups[key].length>0){
      let avg = groups[key].reduce((a,b)=>a+b,0)/groups[key].length;
      labels.push(key);
      values.push(avg.toFixed(1));
    }
  }

  drawChart(labels,values);
  makeConclusion(values);
}

function drawChart(labels,values){

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"平均成績",
        data:values
      }]
    }
  });
}

function makeConclusion(values){

  let trend = values[values.length-1] > values[0] ? "上升" : "無明顯提升";

  document.getElementById("result").innerHTML = `
  1️⃣ 我發現：讀書時間與成績呈現「${trend}趨勢」。<br>
  2️⃣ 可能原因：讀書時間增加，複習更完整。<br>
  3️⃣ 我的建議：每天至少讀書 2 小時效果較好。
  `;
}

</script>

</body>
</html>
