<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>讀書時間 vs 成績專題（完整版）</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: linear-gradient(135deg,#8ec5fc,#e0c3fc);
  font-family: 'Noto Sans TC', sans-serif;
}
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
}
</style>
</head>

<body class="p-6">

<div class="max-w-5xl mx-auto">

<!-- 標題 -->
<div class="card p-6 rounded-2xl mb-6 text-center">
  <h1 class="text-3xl font-black text-blue-600">📚 讀書時間 vs 成績</h1>
  <p class="text-gray-600">量化專題完整實作 🚀</p>
</div>

<!-- 專題流程 -->
<div class="card p-6 rounded-2xl mb-6">
  <h2 class="font-bold text-xl mb-3">🚀 專題流程</h2>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
    <div class="bg-blue-100 p-3 rounded-xl">1️⃣ 問卷設計</div>
    <div class="bg-purple-100 p-3 rounded-xl">2️⃣ 資料收集</div>
    <div class="bg-green-100 p-3 rounded-xl">3️⃣ 資料分析</div>
    <div class="bg-pink-100 p-3 rounded-xl">4️⃣ 結論</div>
  </div>
</div>

<!-- Google表單教學 -->
<div class="card p-6 rounded-2xl mb-6">
  <h2 class="font-bold text-xl mb-4">📋 Step 1：設計 Google 表單</h2>

  <div class="space-y-4">

    <div class="bg-blue-50 p-4 rounded-xl">
      <b>🎯 表單標題：</b>讀書時間 vs 成績調查
    </div>

    <div class="bg-green-50 p-4 rounded-xl">
      <b>📝 題目設計：</b>
      <ul class="list-disc ml-5 mt-2">
        <li>每日讀書時間（數字）</li>
        <li>考試成績（數字）</li>
        <li>手機使用時間（數字）</li>
        <li>專心程度（1~5）</li>
      </ul>
    </div>

    <div class="bg-yellow-50 p-4 rounded-xl">
      <b>⚠️ 設計重點：</b>
      <ul class="list-disc ml-5 mt-2">
        <li>一定要用數字🔥</li>
        <li>每題=一個變數</li>
        <li>避免文字答案</li>
      </ul>
    </div>

  </div>
</div>

<!-- 模擬表單 -->
<div class="card p-6 rounded-2xl mb-6">
  <h2 class="font-bold text-xl mb-4">🧪 Step 2：模擬填寫</h2>

  <div class="grid md:grid-cols-2 gap-4">

    <input id="study" type="number" placeholder="讀書時間 (小時)" class="p-3 rounded-xl border">
    <input id="score" type="number" placeholder="成績" class="p-3 rounded-xl border">
    <input id="phone" type="number" placeholder="手機時間 (小時)" class="p-3 rounded-xl border">

    <select id="focus" class="p-3 rounded-xl border">
      <option value="">專心程度</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>

  </div>

  <button onclick="addData()" class="mt-4 bg-blue-500 text-white px-6 py-2 rounded-xl font-bold">
    ➕ 加入資料
  </button>
</div>

<!-- 資料顯示 -->
<div class="card p-6 rounded-2xl mb-6">
  <h2 class="font-bold text-xl mb-3">📊 資料</h2>
  <div id="dataList"></div>
</div>

<!-- 分析 -->
<div class="text-center mb-6">
  <button onclick="analyze()" class="bg-green-500 text-white px-6 py-3 rounded-xl font-bold">
    🔍 分析資料
  </button>
</div>

<!-- 圖表 -->
<div class="card p-6 rounded-2xl mb-6">
  <canvas id="chart"></canvas>
</div>

<!-- 結論 -->
<div class="card p-6 rounded-2xl">
  <h2 class="font-bold text-xl mb-3">🧠 自動結論</h2>
  <div id="result"></div>
</div>

</div>

<script>

let data = [];

function addData(){
  let s = parseFloat(study.value);
  let sc = parseFloat(score.value);
  let p = parseFloat(phone.value);
  let f = parseFloat(focus.value);

  if(isNaN(s)||isNaN(sc)) return alert("請輸入數值");

  data.push({study:s,score:sc,phone:p,focus:f});
  render();
}

function render(){
  let html="";
  data.forEach(d=>{
    html+=`<div>${d.study}小時 → ${d.score}分</div>`;
  });
  dataList.innerHTML=html;
}

function analyze(){

  let groups={"0-1":[],"1-2":[],"2-3":[],"3+":[]} ;

  data.forEach(d=>{
    if(d.study<1) groups["0-1"].push(d.score);
    else if(d.study<2) groups["1-2"].push(d.score);
    else if(d.study<3) groups["2-3"].push(d.score);
    else groups["3+"].push(d.score);
  });

  let labels=[],values=[];

  for(let k in groups){
    if(groups[k].length){
      let avg=groups[k].reduce((a,b)=>a+b)/groups[k].length;
      labels.push(k);
      values.push(avg.toFixed(1));
    }
  }

  drawChart(labels,values);
  makeConclusion(values);
}

function drawChart(labels,values){
  new Chart(chart,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"平均成績",
        data:values
      }]
    }
  });
}

function makeConclusion(values){
  let trend = values[values.length-1] > values[0] ? "上升" : "沒有明顯提升";

  result.innerHTML = `
  1️⃣ 我發現：成績呈現${trend}趨勢<br>
  2️⃣ 可能原因：讀書時間影響學習<br>
  3️⃣ 建議：每天至少讀書2小時
  `;
}

</script>

</body>
</html>
